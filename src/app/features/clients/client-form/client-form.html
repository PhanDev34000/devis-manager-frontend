<div class="page-header">
  <div>
    <h1>{{ isEditMode ? '✏️ Modifier le client' : '➕ Nouveau client' }}</h1>
    <p>{{ isEditMode ? 'Modifiez les informations du client' : 'Ajoutez un nouveau client' }}</p>
  </div>
  <a routerLink="/clients" class="btn btn-secondary">
    ← Retour
  </a>
</div>

<div class="form-card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Informations principales -->
    <div class="form-section">
      <h2 class="section-title">Informations principales</h2>

      <div class="form-row">
        <div class="form-group">
          <label>Nom / Société <span class="required">*</span></label>
          <input
            type="text"
            formControlName="name"
            placeholder="Ex: Société Dupont"
            [class.error]="isInvalid('name')"
          />
          <span *ngIf="isInvalid('name')" class="error-msg">
            Le nom est obligatoire (min. 2 caractères)
          </span>
        </div>

        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input
            type="email"
            formControlName="email"
            placeholder="Ex: contact@societe.fr"
            [class.error]="isInvalid('email')"
          />
          <span *ngIf="isInvalid('email')" class="error-msg">
            Email invalide
          </span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Téléphone</label>
          <input
            type="tel"
            formControlName="phone"
            placeholder="Ex: 06 12 34 56 78"
          />
        </div>
      </div>
    </div>

    <!-- Adresse -->
    <div class="form-section" formGroupName="address">
      <h2 class="section-title">Adresse</h2>

      <div class="form-row">
        <div class="form-group full-width">
          <label>Rue</label>
          <input
            type="text"
            formControlName="street"
            placeholder="Ex: 12 rue de la Paix"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Ville</label>
          <input
            type="text"
            formControlName="city"
            placeholder="Ex: Paris"
          />
        </div>

        <div class="form-group">
          <label>Code postal</label>
          <input
            type="text"
            formControlName="zip"
            placeholder="Ex: 75001"
          />
        </div>

        <div class="form-group">
          <label>Pays</label>
          <input
            type="text"
            formControlName="country"
            placeholder="Ex: France"
          />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <a routerLink="/clients" class="btn btn-secondary">Annuler</a>
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading$ | async"
      >
        {{ (loading$ | async) ? 'Enregistrement...' : (isEditMode ? 'Mettre à jour' : 'Créer le client') }}
      </button>
    </div>

  </form>
</div>
