<div class="page-header">
  <div>
    <h1>👤 Mon Espace</h1>
    <p>Informations de votre société — apparaîtront sur vos devis</p>
  </div>
</div>

<div class="form-card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Erreur -->
    <div *ngIf="error$ | async as error" class="alert alert-danger">
      ⚠️ {{ error }}
    </div>

    <!-- Infos société -->
    <div class="form-section">
      <h2 class="section-title">Votre société</h2>

      <div class="form-row">
        <div class="form-group">
          <label>Nom de la société <span class="required">*</span></label>
          <input
            type="text"
            formControlName="companyName"
            placeholder="Ex: Studio Photo Dupont"
            [class.error]="isInvalid('companyName')"
          />
          <span *ngIf="isInvalid('companyName')" class="error-msg">
            Champ obligatoire
          </span>
        </div>

        <div class="form-group">
          <label>Nom du représentant <span class="required">*</span></label>
          <input
            type="text"
            formControlName="representativeName"
            placeholder="Ex: Jean Dupont"
            [class.error]="isInvalid('representativeName')"
          />
          <span *ngIf="isInvalid('representativeName')" class="error-msg">
            Champ obligatoire
          </span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email professionnel <span class="required">*</span></label>
          <input
            type="email"
            formControlName="email"
            placeholder="Ex: contact@studio.fr"
            [class.error]="isInvalid('email')"
          />
          <span *ngIf="isInvalid('email')" class="error-msg">
            Email invalide
          </span>
        </div>

        <div class="form-group">
          <label>Téléphone</label>
          <input
            type="tel"
            formControlName="phone"
            placeholder="Ex: 06 12 34 56 78"
          />
        </div>
      </div>
    </div>

<!-- Logo -->
    <div class="form-section">
      <h2 class="section-title">Logo de la société</h2>

      <!-- Prévisualisation -->
      <div *ngIf="logoPreview" class="logo-preview">
        <img [src]="logoPreview" alt="Logo" />
        <button type="button" class="btn-remove-logo" (click)="removeLogo()">
          ✕ Supprimer
        </button>
      </div>

      <!-- Upload -->
      <div *ngIf="!logoPreview" class="logo-upload">
        <label for="logoInput" class="upload-label">
          <span class="upload-icon">📁</span>
          <span>Cliquez pour choisir un logo</span>
          <span class="upload-hint">PNG, JPG — max 1MB</span>
        </label>
        <input
          id="logoInput"
          type="file"
          accept="image/*"
          (change)="onLogoSelected($event)"
          class="upload-input"
        />
      </div>
    </div>

    <!-- Adresse -->
    <div class="form-section" formGroupName="address">
      <h2 class="section-title">Adresse</h2>

      <div class="form-row">
        <div class="form-group full-width">
          <label>Rue</label>
          <input
            type="text"
            formControlName="street"
            placeholder="Ex: 12 rue de la Paix"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Ville</label>
          <input
            type="text"
            formControlName="city"
            placeholder="Ex: Paris"
          />
        </div>
        <div class="form-group">
          <label>Code postal</label>
          <input
            type="text"
            formControlName="zip"
            placeholder="Ex: 75001"
          />
        </div>
        <div class="form-group">
          <label>Pays</label>
          <input
            type="text"
            formControlName="country"
          />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading$ | async"
      >
        {{ (loading$ | async) ? 'Enregistrement...' : '💾 Enregistrer mon profil' }}
      </button>
    </div>

  </form>
</div>
