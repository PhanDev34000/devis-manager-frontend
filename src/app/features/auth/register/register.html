<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <span class="auth-logo">📄</span>
      <h1>FreelanceDevis</h1>
      <p>Créez votre compte gratuit</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div *ngIf="error$ | async as error" class="alert alert-danger">
        ⚠️ {{ error }}
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="votre@email.fr"
          [class.error]="isInvalid('email')"
        />
        <span *ngIf="isInvalid('email')" class="error-msg">
          Email invalide
        </span>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.error]="isInvalid('password')"
        />
        <span *ngIf="isInvalid('password')" class="error-msg">
          Minimum 6 caractères
        </span>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="••••••••"
          [class.error]="isInvalid('confirmPassword')"
        />
        <span *ngIf="isInvalid('confirmPassword')" class="error-msg">
          Les mots de passe ne correspondent pas
        </span>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="loading$ | async"
      >
        {{ (loading$ | async) ? 'Création...' : 'Créer mon compte' }}
      </button>

    </form>

    <div class="auth-footer">
      <p>Déjà un compte ?
        <a routerLink="/login">Se connecter</a>
      </p>
    </div>

  </div>
</div>
